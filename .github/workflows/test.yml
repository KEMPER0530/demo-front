name: Run Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Activate Yarn Classic
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Ensure Yarn classic 1.22.22
        run: |
          YARN_VERSION="$(yarn --version 2>/dev/null || true)"
          if [ "$YARN_VERSION" != "1.22.22" ]; then
            corepack enable
            corepack prepare yarn@1.22.22 --activate
          fi
          yarn --version

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test
