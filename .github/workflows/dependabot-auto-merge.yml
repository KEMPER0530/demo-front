name: Auto Merge Dependabot Security Updates

on:
  workflow_run:
    workflows:
      - "Run Tests"
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot security pull requests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;

            if (!run.pull_requests || run.pull_requests.length === 0) {
              core.info("No pull request is attached to this workflow run.");
              return;
            }

            const prNumber = run.pull_requests[0].number;
            const { owner, repo } = context.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            if (pr.user.login !== "dependabot[bot]") {
              core.info(`PR #${prNumber} is not opened by Dependabot.`);
              return;
            }

            const isSecurityUpdate = pr.labels.some((label) => label.name === "security");
            if (!isSecurityUpdate) {
              core.info(`PR #${prNumber} is not a security update.`);
              return;
            }

            if (pr.state !== "open") {
              core.info(`PR #${prNumber} is already closed.`);
              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: prNumber,
                event: "APPROVE",
                body: "Auto-approving Dependabot security update after tests passed."
              });
            } catch (error) {
              core.info(`Approve step skipped: ${error.message}`);
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: "squash"
            });

            core.info(`Merged Dependabot security PR #${prNumber}.`);
